<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links principales | Emanuel Buczek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
      color: #111a37;
      background:
        radial-gradient(circle at 15% 15%, rgba(96, 239, 255, 0.42), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(160, 113, 255, 0.42), transparent 30%),
        radial-gradient(circle at 50% 96%, rgba(255, 215, 111, 0.2), transparent 24%),
        linear-gradient(135deg, #071638 0%, #1d48d8 48%, #7257ff 100%);
      font-family: "Poppins", Arial, Helvetica, sans-serif;
    }

    #particulas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
    }

    body::before {
      width: 340px;
      height: 340px;
      left: -110px;
      bottom: -120px;
      background: rgba(67, 217, 200, 0.22);
      filter: blur(8px);
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -70px;
      top: 90px;
      background: rgba(255, 255, 255, 0.14);
      filter: blur(4px);
    }

    .contenedor {
      position: relative;
      z-index: 1;
      width: min(500px, 100%);
      padding: 44px 34px 34px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 34px 90px rgba(3, 14, 45, 0.36);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .marca {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border-radius: 22px;
      color: #ffffff;
      background: linear-gradient(135deg, #315dff, #7357ff);
      box-shadow: 0 18px 34px rgba(49, 93, 255, 0.32);
      font-size: 30px;
      font-weight: 800;
    }

    .etiqueta {
      margin: 0 0 10px;
      color: #315dff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      color: #101936;
      font-size: clamp(34px, 7vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .descripcion {
      max-width: 340px;
      margin: 0 auto 30px;
      color: #626d86;
      font-size: 17px;
      line-height: 1.55;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .boton {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 20px 0 22px;
      border-radius: 16px;
      color: #ffffff;
      background: linear-gradient(135deg, #315dff, #5a50ff);
      box-shadow: 0 16px 30px rgba(49, 93, 255, 0.26);
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .boton::after {
      content: ">";
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      font-size: 19px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .boton:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 40px rgba(49, 93, 255, 0.35);
      background: linear-gradient(135deg, #244be0, #6a54ff);
    }

    .boton.secundario {
      color: #101936;
      background: #f0f4ff;
      box-shadow: none;
      border: 1px solid #dde6ff;
    }

    .boton.secundario::after {
      color: #315dff;
      background: #ffffff;
    }

    .boton.secundario:hover {
      background: #e7edff;
      box-shadow: 0 18px 34px rgba(16, 25, 54, 0.12);
    }

    .pie {
      margin: 26px 0 0;
      color: #7b8499;
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .contenedor {
        padding: 34px 20px 24px;
        border-radius: 22px;
      }

      .marca {
        width: 62px;
        height: 62px;
        border-radius: 18px;
        font-size: 26px;
      }

      .boton {
        min-height: 58px;
        padding-left: 18px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particulas"></canvas>

  <main class="contenedor">
    <div class="marca">EB</div>
    <p class="etiqueta">Accesos principales</p>
    <h1>Mis proyectos</h1>
    <p class="descripcion">Elegí una experiencia para conocer mi trabajo y mis proyectos web.</p>

    <div class="botones">
      <a class="boton" href="ong/index.html">Web de mi ONG</a>
      <a class="boton secundario" href="identikit.html">Página original de Identikit</a>
    </div>

    <p class="pie">Emanuel Buczek | Diseño web y proyectos digitales</p>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById("particulas");
      const ctx = canvas.getContext("2d");

      let width, height;
      let mouse = { x: -9999, y: -9999 };

      const COLORS = [
        "rgba(96, 239, 255,",   // cyan
        "rgba(114, 87, 255,",   // violeta
        "rgba(49, 93, 255,",    // azul
        "rgba(160, 113, 255,",  // lila
        "rgba(67, 217, 200,",   // turquesa
      ];

      const PARTICLE_COUNT = 120;
      const MOUSE_RADIUS = 160;
      let particles = [];

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      class Particle {
        constructor() {
          this.reset();
        }

        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.baseX = this.x;
          this.baseY = this.y;
          this.size = Math.random() * 3.5 + 1.5;
          this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.opacity = Math.random() * 0.6 + 0.3;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.drift = Math.random() * Math.PI * 2;
          this.driftSpeed = Math.random() * 0.008 + 0.003;
          this.driftRadius = Math.random() * 30 + 10;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color + this.opacity + ")";
          ctx.fill();
        }

        update() {
          // Movimiento flotante natural
          this.drift += this.driftSpeed;
          let targetX = this.baseX + Math.cos(this.drift) * this.driftRadius;
          let targetY = this.baseY + Math.sin(this.drift) * this.driftRadius;

          // Reacción al mouse
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < MOUSE_RADIUS) {
            let force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
            let angle = Math.atan2(dy, dx);
            // Las partículas se dispersan del mouse
            targetX -= Math.cos(angle) * force * 80;
            targetY -= Math.sin(angle) * force * 80;
            // Aumentar opacidad cerca del mouse
            this.opacity = Math.min(0.95, this.opacity + 0.02);
          } else {
            this.opacity += (0.3 + Math.random() * 0.3 - this.opacity) * 0.01;
          }

          this.x += (targetX - this.x) * 0.04;
          this.y += (targetY - this.y) * 0.04;

          // Mover la base lentamente
          this.baseX += this.vx;
          this.baseY += this.vy;

          // Rebotar en los bordes
          if (this.baseX < 0 || this.baseX > width) this.vx *= -1;
          if (this.baseY < 0 || this.baseY > height) this.vy *= -1;

          this.draw();
        }
      }

      function init() {
        resize();
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push(new Particle());
        }
      }

      function drawLines() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = "rgba(114, 87, 255," + (1 - dist / 100) * 0.12 + ")";
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => p.update());
        drawLines();
        requestAnimationFrame(animate);
      }

      // Eventos
      window.addEventListener("resize", () => {
        resize();
        particles.forEach(p => {
          p.baseX = Math.random() * width;
          p.baseY = Math.random() * height;
        });
      });

      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener("mouseleave", () => {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      // Touch support
      window.addEventListener("touchmove", (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      });

      window.addEventListener("touchend", () => {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      init();
      animate();
    })();
  </script>
</body>
</html>

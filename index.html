<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links principales</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #17213f;
      background: linear-gradient(135deg, #10224a, #315dff 55%, #6d5dfc);
      font-family: Arial, Helvetica, sans-serif;
    }

    .contenedor {
      width: min(440px, 100%);
      padding: 36px 28px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(16, 34, 74, 0.28);
      text-align: center;
    }

    .etiqueta {
      margin: 0 0 10px;
      color: #315dff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.1;
    }

    .descripcion {
      margin: 0 auto 28px;
      color: #5b6478;
      line-height: 1.5;
    }

    .botones {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .boton {
      width: 100%;
      display: block;
      padding: 16px 18px;
      border-radius: 10px;
      color: #ffffff;
      background: #315dff;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .boton:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(49, 93, 255, 0.28);
      background: #244be0;
    }

    .boton.secundario {
      color: #17213f;
      background: #eef2ff;
    }

    .boton.secundario:hover {
      background: #dfe6ff;
      box-shadow: 0 12px 24px rgba(23, 33, 63, 0.12);
    }

    @media (max-width: 480px) {
      .contenedor {
        padding: 30px 20px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <p class="etiqueta">Accesos principales</p>
    <h1>Mis proyectos</h1>
    <p class="descripcion">Elegí a qué página querés entrar.</p>

    <div class="botones">
      <a class="boton" href="ong/index.html">Web de mi ONG</a>
      <a class="boton secundario" href="identikit.html">Página original de Identikit</a>
    </div>
  </main>
</body>
</html>
